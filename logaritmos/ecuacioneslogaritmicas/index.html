<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test de Derivadas de Clasificación de funciones</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            background-color: #ccffcc; /* Verde claro */
            font-size: 18px; /* Aumenta el tamaño de la letra en todo el cuerpo */
        }
        #quiz-container {
            width: 80%;
            max-width: 600px;
            margin: auto;
            text-align: center;
            background-color: #ffffff; /* Fondo blanco */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1); /* Sombra suave */
            font-size: 20px; /* Aumenta el tamaño de la letra en el contenedor del cuestionario */
        }

        .question-container, .option-container {
            background-color: #f0f0f0; /* Fondo gris claro */
            border: 1px solid #ddd;
            margin: 10px 0;
            padding: 16px;
            border-radius: 5px;
            font-size: 20px; /* Aumenta el tamaño de la letra en las preguntas y opciones */
        }

        #options li {
            list-style: none;
            margin: 5px 0;
            padding: 15px;
            background-color: #e9ffe9; /* Verde muy claro */
            cursor: pointer;
            border-radius: 5px;
            font-size: 18px; /* Aumenta el tamaño de la letra en las opciones */
        }

        #options li:hover {
            background-color: #d0ffd0; /* Verde más fuerte al seleccionar */
        }

        #next-question, #previous-question, #finish-test {
            margin-top: 20px;
            padding: 14px 20px;
            font-size: 20px; /* Aumenta el tamaño de la letra en los botones */
            cursor: pointer;
            display: none;
        }

        #question-number {
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="question-number"></div>
    <div class="question-container" id="question"></div>
    <div id="question-image"></div>
    <ul id="options"></ul>
    <button id="previous-question" onclick="loadPreviousQuestion()">Pregunta anterior</button>
    <button id="next-question" onclick="loadNextQuestion()">Siguiente pregunta</button>
    <button id="finish-test" onclick="finishTest()" style="display:none;">Terminar Test</button>
</div>

<div id="result"></div>
<div id="selected-answers"></div>

<script>
    const allQuestions = [
        {
            pregunta: "Convierte de forma exponencial a forma logarítmica: \\(17^2=a\\)",
            imagen: "",
            opciones: [
                "\\(\\log_2{(a)}=17\\)",
                "\\(\\log_{17}{(a)}=2\\)"
            ],
            respuestaCorrecta: "\\(\\log_{17}{(a)}=2\\)",
            formula: "N/A",
            // Aquí incluimos el iframe en la explicación usando un template literal
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=420&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1193947786102107%2F&show_text=false&width=560&t=0" width="560" height="420" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
            
        },
        {
            pregunta: "Convierte de forma logarítmica a exponencial \\(\\log_{3}{(243)}=5\\)",
            imagen: "",
            opciones: [
                "\\(243=3^5\\)",
                "\\(243=5^3\\)"
            ],
            respuestaCorrecta: "\\(243=3^5\\)",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1971142780371178%2F&show_text=false&width=357&t=0" width="357" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
        },
        {
            pregunta: "Emplea la definición de logarítmo y encuentra el valor de la incógnita:\\(\\log_{b}{(4)}=\\frac{1}{2}\\) ",
            imagen: "",
            opciones: [
                "b=2",
                "b=16",
                "b=4"
            ],
            respuestaCorrecta: "b=16",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1326051275607679%2F&show_text=false&width=357&t=0" width="357" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
        },
        {
            pregunta: "Resuelve la siguiente ecuación:  \\(\\log{(x-5)}+\\log{(3)}=\\log{(2x)}\\)",
            imagen: "",
            opciones: [
                "\\(x=15\\)",
                "\\(x=10\\) ",
                "\\(x=5\\) "
            ],
            respuestaCorrecta: "\\(x=15\\)",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F2615874608761363%2F&show_text=false&width=357&t=0" width="357" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
        },
        {
            pregunta: "Resuelve la siguiente ecuación:  \\(5^{x+1}=25\\)",
            opciones: [
                "\\(X=1\\)",
                "\\(X=10\\)",
                "\\(X=5\\)"
            ],
            respuestaCorrecta: "\\(X=1\\)",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1494610551567887%2F&width=300&show_text=false&appId=703667608468790&height=400" width="300" height="400" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
        },
        {
            pregunta: "Resuelve la ecuación:\\(5^{2t+1}=3^{4t-1}\\)",
            opciones: [
                "\\(x=2.3036\\)",
                "\\(x=2\\)",
                "\\(x=1.3036\\)",
                "\\(x=2.5525\\)"
            ],
            respuestaCorrecta: "\\(x=2.3036\\)",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F744621474946542%2F&show_text=false&width=357&t=0" width="357" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
            `
        },
        {
            pregunta: "Resuelve el siguiente problema:",
            imagen: "https://i.imgur.com/06y9PMe.png",
            opciones: [
                "Se necesitan 3 horas ",
                "Se necesitan 5 horas",
                "Se necesitan 4 horas"

            ],
            respuestaCorrecta:  "Se necesitan 5 horas",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1294352778742132%2F&show_text=false&width=357&t=0" width="357" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
            `
        },
        {
            pregunta: "¿Resuelve el siguiente problema:",
            imagen: "https://i.imgur.com/HzUDUBD.png",
            opciones: [
                "Existirán aprox. 33115 bacterias",
                "Existirán aprox. 33120 bacterias",
                "Existirán aprox. 3315 bacterias"
            ],
            respuestaCorrecta: "Existirán aprox. 33115 bacterias",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1826064284788909%2F&show_text=false&width=357&t=0" width="357" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
            `
        },
    ];

    const questions = getRandomQuestions(5);
    let currentQuestionIndex = 0;
    let score = 0;

    function getRandomQuestions(numQuestions) {
        const shuffled = allQuestions.sort(() => 0.5 - Math.random());
        return shuffled.slice(0, numQuestions);
    }

    function shuffleOptions(questions) {
        questions.forEach(question => {
            const correctAnswer = question.respuestaCorrecta;
            question.opciones = question.opciones.sort(() => Math.random() - 0.5);
            question.respuestaCorrectaIndex = question.opciones.indexOf(correctAnswer);
        });
    }

    shuffleOptions(allQuestions);

    function loadQuestion(questionIndex) {
        const question = questions[questionIndex];
        const questionDiv = document.getElementById('question');
        const questionImageDiv = document.getElementById('question-image');

        questionDiv.innerHTML = question.pregunta;
        questionImageDiv.innerHTML = ''; // Limpia cualquier imagen previa

        if (question.imagen) {
            const img = document.createElement('img');
            img.src = question.imagen;
            img.alt = "Imagen de la pregunta";
            img.style.maxWidth = "100%";
            img.style.height = "auto";
            questionImageDiv.appendChild(img);
        }

        document.getElementById('question-number').innerHTML = `Pregunta ${questionIndex + 1} de ${questions.length}`;
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        question.opciones.forEach(function(option) {
            const optionElement = document.createElement('li');
            optionElement.className = 'option-container';
            optionElement.innerHTML = option;
            optionElement.onclick = function() {
                clearSelections();
                this.style.backgroundColor = '#66cc66'; // Seleccionado
                checkAnswer(option);
            };
            optionsContainer.appendChild(optionElement);
        });

        document.getElementById('next-question').style.display = questionIndex < questions.length - 1 ? 'block' : 'none';
        document.getElementById('previous-question').style.display = questionIndex > 0 ? 'block' : 'none';
        document.getElementById('finish-test').style.display = questionIndex === questions.length - 1 ? 'block' : 'none';

        MathJax.typesetPromise(); // Actualiza MathJax
    }

    function clearSelections() {
        document.querySelectorAll('#options li').forEach(function(option) {
            option.style.backgroundColor = '#e9ffe9'; // Restablece el color original
        });
    }

    function checkAnswer(selectedOption) {
        const question = questions[currentQuestionIndex];
        if (selectedOption === question.respuestaCorrecta) {
            score++;
        }
        question.selectedAnswer = selectedOption;

        if (currentQuestionIndex === questions.length - 1) {
            document.getElementById('next-question').style.display = 'none';
            document.getElementById('finish-test').style.display = 'block';
        }
    }

    function loadNextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            loadQuestion(currentQuestionIndex);
        }
    }

    function loadPreviousQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion(currentQuestionIndex);
        }
    }

    function finishTest() {
        showResults();
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('finish-test').style.display = 'none';
    }

    function showResults() {
        let resultsHtml = `<h2>Resultado</h2><p>Tu puntuación es ${score} de ${questions.length}.</p><div><h3>Respuestas Correctas, Fórmulas Usadas y Explicaciones:</h3>`;
        questions.forEach(question => {
            resultsHtml += `<div class="option-container"><strong>Pregunta:</strong> ${question.pregunta} <br> 
            <strong>Respuesta correcta:</strong> ${question.respuestaCorrecta}<br>
            <strong>Fórmula usada:</strong> ${question.formula}<br>
            <strong>Explicación:</strong> ${question.explicacion}</div>`;

            if (question.selectedAnswer) {
                resultsHtml += `<div class="option-container"><strong>Respuesta seleccionada:</strong> ${question.selectedAnswer}</div>`;
            }
        });
        resultsHtml += `</div>`;
        document.getElementById('result').innerHTML = resultsHtml;

        // Añadir mensaje de contacto
        document.getElementById('result').innerHTML += `<p>Si te gustaría reforzar tu conocimiento puedo asesorarte, envíame mensaje vía WhatsApp <a href="https://wa.me/5540972313" target="_blank">5540972313</a>.</p>`;

        MathJax.typesetPromise();
    }

    // Carga la primera pregunta al iniciar
    loadQuestion(currentQuestionIndex);
</script>
</body>
</html>
