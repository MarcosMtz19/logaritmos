<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Logaritmos y Exponenciales</title>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js"></script>

<style>
body{
    background:#ccffcc;
    font-size:18px;
}
#quiz-container{
    width:80%;
    max-width:600px;
    margin:auto;
    text-align:center;
    background:#fff;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    display:none;
}
.question-container,.option-container{
    background:#f0f0f0;
    border:1px solid #ddd;
    margin:10px 0;
    padding:16px;
    border-radius:5px;
}
#options li{
    list-style:none;
    margin:5px 0;
    padding:15px;
    background:#e9ffe9;
    cursor:pointer;
    border-radius:5px;
}
#options li:hover{
    background:#d0ffd0;
}
button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
}
#question-number{
    font-size:20px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="start-container" style="text-align:center;margin-top:50px;">
<h2>Ingresa tu nombre o alias</h2>
<input type="text" id="student-name" placeholder="Escribe tu nombre" style="padding:10px;font-size:18px;">
<br><br>
<button onclick="startQuiz()">Comenzar Test</button>
</div>

<div id="quiz-container">
<div id="question-number"></div>
<div class="question-container" id="question"></div>
<div id="question-image"></div>
<ul id="options"></ul>
<button id="next-question" onclick="loadNextQuestion()">Siguiente</button>
<button id="finish-test" onclick="finishTest()">Terminar Test</button>
</div>

<div id="result"></div>

<script>

let studentName="";
let currentQuestionIndex=0;
let score=0;

    const allQuestions = [
        {
            pregunta: "Convierte de forma exponencial a forma logarítmica: \\(17^2=a\\)",
            imagen: "",
            opciones: [
                "\\(\\log_2{(a)}=17\\)",
                "\\(\\log_{17}{(a)}=2\\)"
            ],
            respuestaCorrecta: "\\(\\log_{17}{(a)}=2\\)",
            formula: "N/A",
            // Aquí incluimos el iframe en la explicación usando un template literal
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=420&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1193947786102107%2F&show_text=false&width=560&t=0" width="560" height="420" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
            
        },
        {
            pregunta: "Convierte de forma logarítmica a exponencial \\(\\log_{3}{(243)}=5\\)",
            imagen: "",
            opciones: [
                "\\(243=3^5\\)",
                "\\(243=5^3\\)"
            ],
            respuestaCorrecta: "\\(243=3^5\\)",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1971142780371178%2F&show_text=false&width=357&t=0" width="357" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
        },
        {
            pregunta: "Emplea la definición de logarítmo y encuentra el valor de la incógnita:\\(\\log_{b}{(4)}=\\frac{1}{2}\\) ",
            imagen: "",
            opciones: [
                "b=2",
                "b=16",
                "b=4"
            ],
            respuestaCorrecta: "b=16",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2F100079792827912%2Fvideos%2F1326051275607679%2F&show_text=false&width=357&t=0" width="357" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
        },
        {
            pregunta: "Convierte de forma exponencial a forma logarítmica: \\(5^{3}=125\\)",
            imagen: "",
            opciones: [
                "\\(\\log_{5}{125}=3\\)",
                "\\(\\log_{3}{125}=3\\)",
                "\\(\\log_{125}{3}=5\\)"
            ],
            respuestaCorrecta: "\\(\\log_{5}{125}=3\\)",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=314&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F928466632903532%2F&show_text=false&width=560&t=0" width="560" height="314" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
            `
        },
        {
            pregunta: "Convierte de forma logaritmica a forma exponencial \\(\\log_{3}{81}=4\\)",
            opciones: [
                "\\(81=3^{4}\\)",
                "\\(81=4^{3}\\)"
            ],
            respuestaCorrecta: "\\(81=3^{4}\\)",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
               <iframe src="https://www.facebook.com/plugins/video.php?height=314&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F1325614459780161%2F&show_text=false&width=560&t=0" width="560" height="314" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                </div>
            `
        },
        {
            pregunta: "Determina si esta correcta la conversión de forma logarítmica a exponencial:",
            imagen: "https://i.imgur.com/tJWsFGJ.png",
            opciones: [
                "Si, es correcto",
                "No, no es correcto"
            ],
            respuestaCorrecta: "Si, es correcto",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=314&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F1254407606172625%2F&show_text=false&width=560&t=0" width="560" height="314" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
                   </div>
            `
        },
        {
            pregunta: "Determina el valor de 'x' de la expresioón: \\(\\log_{16}{(x)}=\\frac{1}{2}\\)",
            opciones: [
                "x=4",
                "\\((\\frac{1}{2})^{16}\\)",
                "x=16"

            ],
            respuestaCorrecta:  "x=4",
            formula: "N/A",
            explicacion: `
                <p>Si quieres ver la explicación en video, aquí está:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=314&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F1460882822138961%2F&show_text=false&width=560&t=0" width="560" height="314" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
            `
        },
    ];



// 🔥 ALEATORIO DE PREGUNTAS
const questions=[...allQuestions]
.sort(()=>0.5-Math.random())
.slice(0,3);

// 🔥 ALEATORIO DE OPCIONES
questions.forEach(q=>{
q.selectedAnswer=null;
q.opciones=[...q.opciones].sort(()=>0.5-Math.random());
});

function startQuiz(){
const name=document.getElementById("student-name").value.trim();
if(name===""){alert("Escribe tu nombre");return;}
studentName=name;
document.getElementById("start-container").style.display="none";
document.getElementById("quiz-container").style.display="block";
loadQuestion(currentQuestionIndex);
}

function loadQuestion(index){

const question=questions[index];
document.getElementById("question").innerHTML=question.pregunta;
document.getElementById("question-image").innerHTML="";

if(question.imagen){
const img=document.createElement("img");
img.src=question.imagen;
img.style.maxWidth="100%";
document.getElementById("question-image").appendChild(img);
}

document.getElementById("question-number").innerHTML=
`Pregunta ${index+1} de ${questions.length}`;

const optionsContainer=document.getElementById("options");
optionsContainer.innerHTML="";

question.opciones.forEach(option=>{
const li=document.createElement("li");
li.innerHTML=option;

li.onclick=()=>{
if(question.selectedAnswer!==null) return;

question.selectedAnswer=option;
li.style.backgroundColor="#66cc66";

document.getElementById("next-question").style.display=
index<questions.length-1?"inline-block":"none";

document.getElementById("finish-test").style.display=
index===questions.length-1?"inline-block":"none";
};

optionsContainer.appendChild(li);
});

document.getElementById("next-question").style.display="none";
document.getElementById("finish-test").style.display="none";

MathJax.typesetPromise();
}

function loadNextQuestion(){
currentQuestionIndex++;
loadQuestion(currentQuestionIndex);
}

function finishTest(){

score=0;

questions.forEach(q=>{
if(q.selectedAnswer===q.respuestaCorrecta){
score++;
}
});

const total=questions.length;
const errores=total-score;
const porcentaje=((score/total)*100).toFixed(2);

document.getElementById("quiz-container").style.display="none";

let html=`<h2>Resultado</h2>
<p>${studentName}, obtuviste <strong>${score}</strong> de ${total} (${porcentaje}%).</p>
<h3>Revisión:</h3>`;

questions.forEach(q=>{

let correcta=q.selectedAnswer===q.respuestaCorrecta;
let fondo=correcta?"#d4edda":"#f8d7da";
let borde=correcta?"#28a745":"#dc3545";
let icono=correcta?"✔ Correcta":"✘ Incorrecta";

html+=`
<div style="
background:${fondo};
border:2px solid ${borde};
margin:12px 0;
padding:16px;
border-radius:8px;
">
<strong>${icono}</strong><br><br>
<strong>Pregunta:</strong> ${q.pregunta}<br>
<strong>Tu respuesta:</strong> ${q.selectedAnswer || "No respondida"}<br>
<strong>Respuesta correcta:</strong> ${q.respuestaCorrecta}<br><br>
<strong>Explicación:</strong> ${q.explicacion}
</div>
`;
});

document.getElementById("result").innerHTML=html;
MathJax.typesetPromise();

fetch("https://script.google.com/macros/s/AKfycbzPp3P44PHky5aLSDJBPy4Pk63HVbOxRj1eDiXMZAA3mDtM8KEfTWTZie1GN8OVAt1c/exec",{
method:"POST",
body:JSON.stringify({
nombre:studentName,
aciertos:score,
errores:errores,
total:total,
porcentaje:porcentaje
})
});
}

</script>
</body>
</html>
