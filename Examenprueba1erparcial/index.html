#quiz-container {
    width: 80%;

    text-align: center;
    background-color: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.question-container, .option-container {
    background-color: #f0f0f0;
    border: 1px solid #ddd;
    margin: 10px 0;
    padding: 16px;
    border-radius: 5px;

    list-style: none;

    padding: 15px;
    background-color: #e9ffe9;
    cursor: pointer;
    border-radius: 5px;
}

#options li:hover {
    background-color: #d0ffd0;
}

button {
    margin-top: 20px;
    padding: 12px 18px;
    font-size: 18px;
    cursor: pointer;
    display: none;
}

.correct {
    color: green;
    font-weight: bold;
}

.incorrect {
    color: red;
    font-weight: bold;
}

#contadorIntentos {
    text-align:center;
    margin-top:15px;
    font-weight:bold;

</head>

    <button id="previous-question" onclick="loadPreviousQuestion()">Pregunta anterior</button>

/* 🔥 FUNCIÓN PARA ENVIAR A GOOGLE SHEETS */
function enviarResultados(score, total) {
    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            score: score,
            total: total

    .then(res => res.json())
    .then(data => console.log("Guardado en Sheets"))

/* 🔥 MEZCLAR */
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

shuffle(allQuestions);
const questions = allQuestions.slice(0, 6);
questions.forEach(q => shuffle(q.opciones));

let currentQuestionIndex = 0;
let score = 0;

function loadQuestion(index) {

    const question = questions[index];

    document.getElementById('question-number').innerHTML =
        `Pregunta ${index + 1} de ${questions.length}`;

    document.getElementById('question').innerHTML = question.pregunta;

    const questionImageDiv = document.getElementById('question-image');
    questionImageDiv.innerHTML = "";

    if (question.imagen) {
        const img = document.createElement('img');
        img.src = question.imagen;
        img.style.maxWidth = "100%";
        questionImageDiv.appendChild(img);
    }

    const optionsContainer = document.getElementById('options');
    optionsContainer.innerHTML = "";

    question.opciones.forEach(option => {
        const li = document.createElement('li');
        li.innerHTML = option;
        li.onclick = function() {
            clearSelections();
            this.style.backgroundColor = "#66cc66";
            question.selectedAnswer = option;
        };
        optionsContainer.appendChild(li);
    });

    document.getElementById('previous-question').style.display =
        index > 0 ? 'block' : 'none';

    document.getElementById('next-question').style.display =
        index < questions.length - 1 ? 'block' : 'none';

    document.getElementById('finish-test').style.display =
        index === questions.length - 1 ? 'block' : 'none';

    MathJax.typesetPromise();
}

function clearSelections() {
    document.querySelectorAll('#options li').forEach(option => {
        option.style.backgroundColor = '#e9ffe9';
    });
}

function loadNextQuestion() {
    if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        loadQuestion(currentQuestionIndex);
    }
}

function loadPreviousQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        loadQuestion(currentQuestionIndex);
    }
}

function finishTest() {

    score = 0;
    questions.forEach(q => {
        if (q.selectedAnswer === q.respuestaCorrecta) score++;
    });

    /* 🔥 INCREMENTAR CONTADOR LOCAL */
    contadorLocal++;
    localStorage.setItem("intentos", contadorLocal);
    document.getElementById("contadorIntentos").innerHTML =
        "Este cuestionario ha sido respondido " + contadorLocal + " veces.";

    /* 🔥 ENVIAR A SHEETS */
    enviarResultados(score, questions.length);

    showResults();
    document.getElementById('quiz-container').style.display = "none";
}

function showResults() {

    let html = `
        <h2>Resultado Final</h2>
        <p>Tu puntuación es ${score} de ${questions.length}</p>
        <hr>
    `;

    questions.forEach(q => {

        let icon = q.selectedAnswer === q.respuestaCorrecta ? "✔" : "✘";
        let clase = q.selectedAnswer === q.respuestaCorrecta ? "correct" : "incorrect";

        html += `
        <div class="option-container">
            <strong>Pregunta:</strong> ${q.pregunta}<br><br>
            <strong>Tu respuesta:</strong>
            <span class="${clase}">
                ${icon} ${q.selectedAnswer || "No respondida"}
            </span><br><br>
            <strong>Respuesta correcta:</strong>
            ${q.respuestaCorrecta}<br><br>
            <strong>Explicación:</strong>
            ${q.explicacion}
        </div><br>
        `;
    });

    document.getElementById('result').innerHTML = html;
    MathJax.typesetPromise();
}

loadQuestion(currentQuestionIndex);

</script>
