<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Derivada de funciones algebraicas</title>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js"></script>

<style>
body{
    background:#ccffcc;
    font-size:18px;
}
#quiz-container{
    width:80%;
    max-width:600px;
    margin:auto;
    text-align:center;
    background:#fff;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    display:none;
}
.question-container,.option-container{
    background:#f0f0f0;
    border:1px solid #ddd;
    margin:10px 0;
    padding:16px;
    border-radius:5px;
}
#options li{
    list-style:none;
    margin:5px 0;
    padding:15px;
    background:#e9ffe9;
    cursor:pointer;
    border-radius:5px;
}
#options li:hover{
    background:#d0ffd0;
}
button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
}
#question-number{
    font-size:20px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="start-container" style="text-align:center;margin-top:50px;">
<h2>Ingresa tu nombre o alias</h2>
<input type="text" id="student-name" placeholder="Escribe tu nombre" style="padding:10px;font-size:18px;">
<br><br>
<button onclick="startQuiz()">Comenzar Test</button>
</div>

<div id="quiz-container">
<div id="question-number"></div>
<div class="question-container" id="question"></div>
<div id="question-image"></div>
<ul id="options"></ul>
<button id="next-question" onclick="loadNextQuestion()">Siguiente</button>
<button id="finish-test" onclick="finishTest()">Terminar Test</button>
</div>

<div id="result"></div>

<script>

let studentName="";
let currentQuestionIndex=0;
let score=0;

const allQuestions = [
    {
        pregunta: "Deriva \\(s(t)=b^{2}t\\)",
        imagen: "",
        opciones: [
            "\\(s'(t)=b^2\\)",
            "\\(s'(t)=2b^{2t}\\)",
            "\\(s'(t)=b^{2t}\\)"
        ],
        respuestaCorrecta: "\\(s'(t)=b^2\\)",
        formula: "N/A",
        explicacion: `
                <p> Si Quieres ver la explicaciÃ³n, aquÃ­ estÃ¡:</p>
                <div style="display:flex;justify-content:center;">
                <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F1690716062090885%2F&show_text=false&width=380&t=0" width="380" height="476" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowFullScreen="true"></iframe>
            `
    },
    {
        pregunta: "deriva la funciÃ³n: \\(f(x)=5\\sqrt[5]{x}\\)",
        imagen: "",
        opciones: [
            "\\(f'(x)=\\frac{1}{\\sqrt[5]{x^4}}\\)",
            "\\(f'(x)=\\frac{5}{\\sqrt[5]{x}}\\)",
            "\\(f'(x)=\\frac{1}{x}\\)"
        ],
        respuestaCorrecta: "\\(f'(x)=\\frac{1}{\\sqrt[5]{x^4}}\\)",
        formula: "N/A",
        explicacion: "Uso de potencia fraccionaria."
    },
    {
        pregunta: "Deriva: \\(f(x)=7x^3-3x^2+3x-12\\)",
        imagen: "",
        opciones: [
            "\\(f'(x)=21x^2-6x+3\\)",
            "\\(f'(x)=7x^2-6x+3\\)",
            "\\(f'(x)=21x-6\\)"
        ],
        respuestaCorrecta: "\\(f'(x)=21x^2-6x+3\\)",
        formula: "N/A",
        explicacion: "Regla de la potencia."
    },
    {
        pregunta: "Deriva respecto a x: \\(f(x)=\\frac{x^4-3x^3-6x^2-3x+2}{x}\\)",
        imagen: "",
        opciones: [
            "\\(f'(x)=3x^2-6x-6-\\frac{2}{x^2}\\)",
            "\\(f'(x)=4x^3-9x^2\\)",
            "\\(f'(x)=3x^2-6x\\)"
        ],
        respuestaCorrecta: "\\(f'(x)=3x^2-6x-6-\\frac{2}{x^2}\\)",
        formula: "N/A",
        explicacion: "DivisiÃ³n tÃ©rmino a tÃ©rmino."
    },
    {
        pregunta: "Deriva: \\(f(x)=\\frac{\\sqrt[3]{x}}{5}-\\frac{3}{\\sqrt[3]{x}}\\)",
        imagen: "",
        opciones: [
            "\\(f'(x)=\\frac{1}{15\\sqrt[3]{x^2}}+\\frac{1}{x\\sqrt[3]{x}}\\)",
            "\\(f'(x)=\\frac{1}{3x}+\\frac{3}{x^2}\\)",
            "\\(f'(x)=\\frac{1}{x}\\)"
        ],
        respuestaCorrecta: "\\(f'(x)=\\frac{1}{15\\sqrt[3]{x^2}}+\\frac{1}{x\\sqrt[3]{x}}\\)",
        formula: "N/A",
        explicacion: "Uso de exponentes racionales."
    },
    {
        pregunta: "Deriva la funciÃ³n: \\(f(x)=3ax^4-4ax^3-5bx^2+7cx\\)",
        imagen: "",
        opciones: [
            "\\(f'(x)=12ax^3-12ax^2-10bx+7c\\)",
            "\\(f'(x)=12ax^3-4ax^2\\)",
            "\\(f'(x)=3ax^3-5bx\\)"
        ],
        respuestaCorrecta: "\\(f'(x)=12ax^3-12ax^2-10bx+7c\\)",
        formula: "N/A",
        explicacion: "DerivaciÃ³n tÃ©rmino a tÃ©rmino."
    },
    {
        pregunta: "Deriva la funciÃ³n: \\(f(x)=\\frac{5}{x^4}-\\frac{6}{x^3}-\\frac{7}{x^2}-\\frac{3}{x}+\\frac{1}{5}\\)",
        imagen: "",
        opciones: [
            "\\(f'(x)=-\\frac{20}{x^5}+\\frac{18}{x^4}+\\frac{14}{x^3}+\\frac{3}{x^2}\\)",
            "\\(f'(x)=\\frac{20}{x^5}-\\frac{18}{x^4}\\)",
            "\\(f'(x)=-\\frac{5}{x^4}\\)"
        ],
        respuestaCorrecta: "\\(f'(x)=-\\frac{20}{x^5}+\\frac{18}{x^4}+\\frac{14}{x^3}+\\frac{3}{x^2}\\)",
        formula: "N/A",
        explicacion: "Regla de potencias negativas."
    }
];


// ðŸ”¥ ALEATORIO DE PREGUNTAS
const questions=[...allQuestions]
.sort(()=>0.5-Math.random())
.slice(0,3);

// ðŸ”¥ ALEATORIO DE OPCIONES
questions.forEach(q=>{
q.selectedAnswer=null;
q.opciones=[...q.opciones].sort(()=>0.5-Math.random());
});

function startQuiz(){
const name=document.getElementById("student-name").value.trim();
if(name===""){alert("Escribe tu nombre");return;}
studentName=name;
document.getElementById("start-container").style.display="none";
document.getElementById("quiz-container").style.display="block";
loadQuestion(currentQuestionIndex);
}

function loadQuestion(index){

const question=questions[index];
document.getElementById("question").innerHTML=question.pregunta;
document.getElementById("question-image").innerHTML="";

if(question.imagen){
const img=document.createElement("img");
img.src=question.imagen;
img.style.maxWidth="100%";
document.getElementById("question-image").appendChild(img);
}

document.getElementById("question-number").innerHTML=
`Pregunta ${index+1} de ${questions.length}`;

const optionsContainer=document.getElementById("options");
optionsContainer.innerHTML="";

question.opciones.forEach(option=>{
const li=document.createElement("li");
li.innerHTML=option;

li.onclick=()=>{
if(question.selectedAnswer!==null) return;

question.selectedAnswer=option;
li.style.backgroundColor="#66cc66";

document.getElementById("next-question").style.display=
index<questions.length-1?"inline-block":"none";

document.getElementById("finish-test").style.display=
index===questions.length-1?"inline-block":"none";
};

optionsContainer.appendChild(li);
});

document.getElementById("next-question").style.display="none";
document.getElementById("finish-test").style.display="none";

MathJax.typesetPromise();
}

function loadNextQuestion(){
currentQuestionIndex++;
loadQuestion(currentQuestionIndex);
}

function finishTest(){

score=0;

questions.forEach(q=>{
if(q.selectedAnswer===q.respuestaCorrecta){
score++;
}
});

const total=questions.length;
const errores=total-score;
const porcentaje=((score/total)*100).toFixed(2);

document.getElementById("quiz-container").style.display="none";

let html=`<h2>Resultado</h2>
<p>${studentName}, obtuviste <strong>${score}</strong> de ${total} (${porcentaje}%).</p>
<h3>RevisiÃ³n:</h3>`;

questions.forEach(q=>{

let correcta=q.selectedAnswer===q.respuestaCorrecta;
let fondo=correcta?"#d4edda":"#f8d7da";
let borde=correcta?"#28a745":"#dc3545";
let icono=correcta?"âœ” Correcta":"âœ˜ Incorrecta";

html+=`
<div style="
background:${fondo};
border:2px solid ${borde};
margin:12px 0;
padding:16px;
border-radius:8px;
">
<strong>${icono}</strong><br><br>
<strong>Pregunta:</strong> ${q.pregunta}<br>
<strong>Tu respuesta:</strong> ${q.selectedAnswer || "No respondida"}<br>
<strong>Respuesta correcta:</strong> ${q.respuestaCorrecta}<br><br>
<strong>ExplicaciÃ³n:</strong> ${q.explicacion}
</div>
`;
});

document.getElementById("result").innerHTML=html;
MathJax.typesetPromise();

fetch("https://script.google.com/macros/s/AKfycbx5zMbjXzJScGD6lxl0CkpLgvZRHZkXJ4-oDvD5vPEigFHqqRluUHFOw03aNFxypZ3g/exec",{
method:"POST",
body:JSON.stringify({
nombre:studentName,
aciertos:score,
errores:errores,
total:total,
porcentaje:porcentaje
})
});
}

</script>
</body>
</html>
